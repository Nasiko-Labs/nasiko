version: "3.8"
services:
  aegis:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./sessions:/app/sessions
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
