# ─────────────────────────────────────────────────────────────────────────────
# LLM Gateway (Track 2) — LiteLLM proxy + dedicated Postgres
# Agents call this instead of hardcoding provider API keys.
# ─────────────────────────────────────────────────────────────────────────────

# ── Provider secrets (read by the gateway at startup) ───────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-secrets
  namespace: nasiko
  labels:
    app: llm-gateway
    component: config
type: Opaque
stringData:
  LLM_GATEWAY_MASTER_KEY: {{ .Values.llmGateway.masterKey | default "sk-nasiko-master-key" | quote }}
  OPENAI_API_KEY: {{ .Values.llmGateway.providers.openaiApiKey | default "" | quote }}
  OPENROUTER_API_KEY: {{ .Values.llmGateway.providers.openrouterApiKey | default "" | quote }}
  MINIMAX_API_KEY: {{ .Values.llmGateway.providers.minimaxApiKey | default "" | quote }}
  MINIMAX_BASE_URL: {{ .Values.llmGateway.providers.minimaxBaseUrl | default "https://api.minimax.io/v1" | quote }}
  DATABASE_URL: "postgresql://litellm:litellm@llm-gateway-db-service.nasiko.svc.cluster.local:5432/litellm"
---
# ── Gateway config (mounted as a file into the proxy container) ─────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: nasiko
  labels:
    app: llm-gateway
    component: config
data:
  litellm_config.yaml: |
    model_list:
      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-4o-mini
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: openrouter/nemotron
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY
      - model_name: openrouter/gemini-flash
        litellm_params:
          model: openrouter/google/gemini-2.5-flash
          api_key: os.environ/OPENROUTER_API_KEY
      - model_name: minimax
        litellm_params:
          model: openai/MiniMax-M2.7
          api_key: os.environ/MINIMAX_API_KEY
          api_base: os.environ/MINIMAX_BASE_URL

    router_settings:
      routing_strategy: simple-shuffle
      model_group_alias:
        default: ["openrouter/nemotron"]

    general_settings:
      master_key: os.environ/LLM_GATEWAY_MASTER_KEY
      database_url: os.environ/DATABASE_URL

    litellm_settings:
      success_callback: ["otel"]
      failure_callback: ["otel"]

    environment_variables:
      OTEL_EXPORTER: "otlp_http"
      OTEL_ENDPOINT: "http://phoenix-service.nasiko.svc.cluster.local:4318"
      OTEL_HEADERS: ""
---
# ── Dedicated Postgres for virtual key persistence ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-gateway-db-pvc
  namespace: nasiko
  labels:
    app: llm-gateway-db
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway-db
  namespace: nasiko
  labels:
    app: llm-gateway-db
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway-db
  template:
    metadata:
      labels:
        app: llm-gateway-db
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: litellm
            - name: POSTGRES_USER
              value: litellm
            - name: POSTGRES_PASSWORD
              value: litellm
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: llm-gateway-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-db-service
  namespace: nasiko
  labels:
    app: llm-gateway-db
spec:
  selector:
    app: llm-gateway-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
# ── LiteLLM proxy ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: nasiko
  labels:
    app: llm-gateway
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
        component: gateway
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm-database:main-latest
          args:
            - "--config"
            - "/app/litellm_config.yaml"
            - "--port"
            - "4000"
            - "--num_workers"
            - "4"
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - secretRef:
                name: llm-gateway-secrets
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: LLM_GATEWAY_MASTER_KEY
            - name: OTEL_EXPORTER
              value: "otlp_http"
            - name: OTEL_ENDPOINT
              value: "http://phoenix-service.nasiko.svc.cluster.local:4318"
          volumeMounts:
            - name: gateway-config
              mountPath: /app/litellm_config.yaml
              subPath: litellm_config.yaml
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: gateway-config
          configMap:
            name: llm-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-service
  namespace: nasiko
  labels:
    app: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
---
# ── ConfigMap agents read for the gateway URL (injected as env) ─────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-endpoint
  namespace: nasiko
  labels:
    app: llm-gateway
    component: config
data:
  LLM_GATEWAY_URL: "http://llm-gateway-service.nasiko.svc.cluster.local:4000"
