server {
  listen 4001;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /superuser_credentials.json {
    alias /run/nasiko/superuser_credentials.json;
    add_header Cache-Control "no-store";
  }
}
