<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#f8fafc"/>
  <text x="700" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700" fill="#111827">Buildthon Success Criteria Scorecard</text>
  <text x="700" y="92" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#64748b">What judges asked for vs. what this implementation proves locally.</text>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="85" y="145" width="590" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="120" y="185" font-size="22" font-weight="700" fill="#1f2937">Faster repeated responses</text>
    <text x="120" y="220" font-size="17" fill="#475569">8.468s first call to 0.074s repeated call</text>
    <text x="620" y="215" text-anchor="end" font-size="28" font-weight="800" fill="#047857">PASS</text>

    <rect x="725" y="145" width="590" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="760" y="185" font-size="22" font-weight="700" fill="#1f2937">Reduced duplicate processing</text>
    <text x="760" y="220" font-size="17" fill="#475569">Cache hit metrics prove repeat bypasses agent</text>
    <text x="1260" y="215" text-anchor="end" font-size="28" font-weight="800" fill="#047857">PASS</text>

    <rect x="85" y="315" width="590" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="120" y="355" font-size="22" font-weight="700" fill="#1f2937">Stable overload handling</text>
    <text x="120" y="390" font-size="17" fill="#475569">3 concurrent calls, 2 queued, 0 failures</text>
    <text x="620" y="385" text-anchor="end" font-size="28" font-weight="800" fill="#047857">PASS</text>

    <rect x="725" y="315" width="590" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="760" y="355" font-size="22" font-weight="700" fill="#1f2937">Operational visibility</text>
    <text x="760" y="390" font-size="17" fill="#475569">Admin JSON stats and Prometheus metrics</text>
    <text x="1260" y="385" text-anchor="end" font-size="28" font-weight="800" fill="#047857">PASS</text>

    <rect x="145" y="520" width="1110" height="110" rx="24" fill="#111827"/>
    <text x="700" y="562" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">Winning Position</text>
    <text x="700" y="598" text-anchor="middle" font-size="18" fill="#d1d5db">This is a unified infrastructure control layer, not a single-agent trick: it sits between gateway and fleet, protects compute, and exposes operator controls.</text>
  </g>
</svg>
