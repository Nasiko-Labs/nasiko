server {
  listen 4000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /app {
    return 301 /app/;
  }

  location ^~ /app/assets/ {
    rewrite ^/app/(.*)$ /$1 break;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /app/ {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
